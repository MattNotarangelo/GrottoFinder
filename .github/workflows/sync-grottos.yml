name: Sync grotto data

# Weekly refresh of the grotto dataset from the NSS source. Opens a PR with the
# diff so a human reviews changes (and catches parser breakage) before they go
# live. Never pushes to main directly.
on:
  schedule:
    - cron: "17 7 * * 1" # Mondays 07:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Runs scrape -> geocode -> merge -> emit. The pipeline's SAFETY GUARD
      # exits non-zero (failing this job) if the scrape yields too few grottos,
      # so a broken source can never overwrite committed data.
      - name: Run pipeline
        run: npm run pipeline

      - name: Open PR if the dataset changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            public/grottos.geojson
            data/scraped.json
            data/geocode-cache.json
          branch: bot/grotto-sync
          delete-branch: true
          commit-message: "chore(data): weekly grotto sync"
          title: "chore(data): weekly grotto sync"
          body: |
            Automated weekly sync of the NSS grotto dataset.

            **Review checklist**
            - [ ] The grotto count in `public/grottos.geojson` looks sane (~200).
            - [ ] No unexpected mass add/remove (would indicate a parser break).
            - [ ] New towns geocoded to plausible town centroids.

            Generated by `.github/workflows/sync-grottos.yml`.
